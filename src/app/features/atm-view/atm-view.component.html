<div class="modal-overlay">
    <div class="modal-content">
        <div class="modal-header">
            <h2>ATM Details</h2>
            <button class="btn-close" (click)="close.emit()">×</button>
        </div>

        <div class="atm-detail">
            <p><strong>Name:</strong> {{ atm.atmName }}</p>
            <p><strong>Manufacturer:</strong> {{ atm.manufacturer }}</p>
            <p><strong>Type:</strong> {{ atm.type }}</p>
            <p><strong>Serial:</strong> {{ atm.serialNumber }}</p>

            <img *ngIf="atm.image" [src]="atm.image" />
        </div>
    </div>
</div>
